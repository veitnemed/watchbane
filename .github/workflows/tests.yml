name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt
          py -m pip install pytest

      - name: Compile
        run: py -m compileall app apis candidates common config dataset desktop posters scripts storage ui web tests

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: py -m pytest
